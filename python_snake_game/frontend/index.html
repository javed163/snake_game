<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Snake Game with AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Python Snake Game with AI</h1>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="controls">
            <button id="startButton">Start Training</button>
            <button id="stopButton">Stop and Save Model</button>
        </div>
        <div id="scoreBoard">
            <p>Score: <span id="score">0</span></p>
            <p>Record: <span id="record">0</span></p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
